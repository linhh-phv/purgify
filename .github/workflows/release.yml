name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.5)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PWD: ${{ secrets.APPLE_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PWD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          rm /tmp/cert.p12

      - name: Build, sign, notarize & package
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          chmod +x scripts/release.sh
          ./scripts/release.sh

      - name: Get version
        id: version
        run: |
          VERSION=$(xcodebuild -project Purgify/Purgify.xcodeproj -scheme Purgify \
            -showBuildSettings 2>/dev/null | grep MARKETING_VERSION | awk '{print $3}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          ls -lh /tmp/Purgify-${VERSION}.dmg

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${{ github.ref_name }}$" | head -1)
          if [[ -n "$PREV_TAG" ]]; then
            NOTES=$(git log ${PREV_TAG}..HEAD --oneline --no-merges)
          else
            NOTES=$(git log --oneline --no-merges | head -20)
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate appcast.xml
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_PATH="/tmp/Purgify-${VERSION}.dmg"
          DOWNLOAD_URL="https://github.com/linhh-phv/purgify/releases/download/v${VERSION}/Purgify-${VERSION}.dmg"
          PUB_DATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")
          DMG_SIZE=$(stat -f%z "$DMG_PATH")
          BUILD=$(xcodebuild -project Purgify/Purgify.xcodeproj -scheme Purgify \
            -showBuildSettings 2>/dev/null | grep -w CURRENT_PROJECT_VERSION | awk '{print $3}')

          brew install --cask sparkle
          SIGN_UPDATE=$(find /opt/homebrew/Caskroom/sparkle -name "sign_update" | grep -v dSYM | head -1)

          printf '%s' "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_key
          SIGN_OUTPUT=$("$SIGN_UPDATE" --ed-key-file /tmp/sparkle_key "$DMG_PATH" 2>&1)
          rm -f /tmp/sparkle_key
          echo "sign_update output: $SIGN_OUTPUT"

          SIGNATURE=$(echo "$SIGN_OUTPUT" | grep -o 'sparkle:edSignature="[^"]*"' | sed 's/sparkle:edSignature="\(.*\)"/\1/')
          if [[ -z "$SIGNATURE" ]]; then
            echo "ERROR: Could not extract signature from sign_update output"
            exit 1
          fi

          python3 scripts/gen_appcast.py "$VERSION" "$BUILD" "$DMG_SIZE" "$DOWNLOAD_URL" "$PUB_DATE" "$SIGNATURE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Purgify v${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          files: |
            /tmp/Purgify-${{ steps.version.outputs.version }}.dmg
            /tmp/appcast.xml
